<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funora - Vedgames Production</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #0f1020, #000);
color:white;
text-align:center;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
background: rgba(255,255,255,0.05);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.brand{
font-size:12px;
opacity:0.7;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background: rgba(255,255,255,0.06);
padding:25px;
border-radius:16px;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
transform:scale(1.05);
border-color:#00ffcc;
box-shadow:0 0 15px #00ffcc;
}

.screen{
display:none;
padding:20px;
}

.active{
display:block;
}

input{
padding:12px;
width:80%;
max-width:300px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
padding:12px 18px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00ffcc,#00aaff);
font-weight:bold;
cursor:pointer;
}

.back{
background:linear-gradient(45deg,#ff4d4d,#ff0066);
color:white;
}

.result{
margin-top:15px;
font-size:20px;
}

.glow{
color:#00ffcc;
text-shadow:0 0 10px #00ffcc;
}

</style>
</head>

<body>

<header>
🔥 FUNORA
<div class="brand">Made by Vedgames Production</div>
</header>

<!-- HOME -->
<div id="home" class="screen active">

<h2 class="glow">Select Game</h2>

<div class="menu">

<div class="card" onclick="openGame('lie')">🕵️ Lie Detector</div>
<div class="card" onclick="openGame('roast')">🔥 Roast</div>
<div class="card" onclick="openGame('aura')">⚡ Aura</div>
<div class="card" onclick="openGame('battle')">⚔️ Battle</div>
<div class="card" onclick="openGame('click')">🏆 Click Battle</div>

</div>

</div>

<!-- LIE -->
<div id="lie" class="screen">
<h2>🕵️ Lie Detector</h2>
<button onclick="lie()">SCAN</button>
<div class="result" id="lieres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- ROAST -->
<div id="roast" class="screen">
<h2>🔥 Roast Generator</h2>
<input id="name" placeholder="Enter name">
<br>
<button onclick="roast()">ROAST</button>
<div class="result" id="roastres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- AURA -->
<div id="aura" class="screen">
<h2>⚡ Aura Checker</h2>
<button onclick="aura()">Check Aura</button>
<div class="result" id="aurares"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- BATTLE -->
<div id="battle" class="screen">
<h2>⚔️ Friend Battle</h2>
<input id="p1" placeholder="Player 1"><br>
<input id="p2" placeholder="Player 2"><br>
<button onclick="battle()">FIGHT</button>
<div class="result" id="battleres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- CLICK BATTLE -->
<div id="click" class="screen">
<h2>🏆 Click Battle (10 sec)</h2>

<input id="player" placeholder="Your Name"><br>

<h3>Score: <span id="score">0</span></h3>

<button onclick="clickMe()">CLICK TO START + PLAY</button>

<div class="result" id="time">Tap to start game</div>

<h3>🏅 Leaderboard</h3>
<div id="board"></div>

<br><button class="back" onclick="back()">Back</button>
</div>

<script>

let score = 0;
let time = 10;
let timer;
let timerStarted = false;

// NAV
function openGame(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function back(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('home').classList.add('active');
}

// GAMES
function lie(){
document.getElementById("lieres").innerHTML =
Math.floor(Math.random()*100)+"% FAKE 💀";
}

function roast(){
let n=document.getElementById("name").value;

let roasts=[
n+" has NPC energy 💀",
n+" studies from reels 😂",
n+" is buffering in life ⏳",
n+" lost IQ in update 🤡"
];

document.getElementById("roastres").innerHTML =
roasts[Math.floor(Math.random()*roasts.length)];
}

function aura(){
let a=Math.floor(Math.random()*1000);

let txt="";
if(a>800) txt="👑 LEGENDARY AURA";
else if(a>500) txt="😎 STRONG AURA";
else txt="💀 NPC ENERGY";

document.getElementById("aurares").innerHTML =
a + " → " + txt;
}

function battle(){
let p1=document.getElementById("p1").value;
let p2=document.getElementById("p2").value;

let win=Math.random()<0.5?p1:p2;

document.getElementById("battleres").innerHTML =
"🏆 " + win + " WINS!";
}

// CLICK BATTLE
function clickMe(){

let name = document.getElementById("player").value;

// vibration error if no name
if(!name){
if(navigator.vibrate){
navigator.vibrate([200,100,200]);
}
document.getElementById("time").innerHTML =
"⚠️ Enter your name first!";
return;
}

// auto start timer
if(!timerStarted){
startGame();
timerStarted = true;
}

if(time > 0){
score++;
document.getElementById("score").innerHTML = score;
}

}

function startGame(){

score = 0;
time = 10;
document.getElementById("score").innerHTML = 0;

timer = setInterval(()=>{

time--;
document.getElementById("time").innerHTML =
"⏱️ Time Left: " + time;

if(time <= 0){
clearInterval(timer);
timerStarted = false;

document.getElementById("time").innerHTML =
"🏁 Finished! Score: " + score;

saveScore();
loadBoard();
}

},1000);

}

// leaderboard
function saveScore(){

let name = document.getElementById("player").value;

let data = JSON.parse(localStorage.getItem("board") || "[]");

data.push({name:name, score:score});

data.sort((a,b)=>b.score-a.score);

data = data.slice(0,5);

localStorage.setItem("board", JSON.stringify(data));

}

function loadBoard(){

let data = JSON.parse(localStorage.getItem("board") || "[]");

let html="";

data.forEach(d=>{
html += `<p>🏅 ${d.name} - ${d.score}</p>`;
});

document.getElementById("board").innerHTML = html;

}

loadBoard();

</script>

</body>
</html>
