<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funora - Veedgames Production</title>

<style>

body{
margin:0;
font-family:Arial;
background:#07081a;
color:white;
text-align:center;
overflow:hidden;
}

header{
padding:15px;
background:#111;
font-size:22px;
}

.brand{
font-size:12px;
opacity:0.8;
color:#00ffcc;
}

.screen{display:none;padding:15px;}
.active{display:block;}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#1a1a2e;
padding:20px;
border-radius:12px;
cursor:pointer;
}

input{
padding:10px;
width:80%;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:8px;
background:#00ffcc;
font-weight:bold;
cursor:pointer;
}

.back{
background:#ff4d4d;
color:white;
}

#game{
width:100%;
height:320px;
background:#000;
position:relative;
overflow:hidden;
border-radius:10px;
}

#bird{
width:25px;
height:25px;
background:yellow;
position:absolute;
left:60px;
top:120px;
border-radius:50%;
}

.pipe{
position:absolute;
width:40px;
background:green;
right:-60px;
}

.gameOver{
color:red;
font-size:22px;
}

</style>
</head>

<body>

<header>
🔥 FUNORA STUDIO
<div class="brand">Veedgames Production</div>
</header>

<!-- HOME -->
<div id="home" class="screen active">

<div class="menu">

<div class="card" onclick="openGame('lie')">🕵️ Lie</div>
<div class="card" onclick="openGame('roast')">🔥 Roast</div>
<div class="card" onclick="openGame('aura')">⚡ Aura</div>
<div class="card" onclick="openGame('flappy')">🐤 Flappy</div>

</div>
</div>

<!-- LIE -->
<div id="lie" class="screen">
<h2>Lie Detector</h2>
<input id="lieInput" placeholder="Enter text">
<br>
<button onclick="lie()">SCAN</button>
<div id="lieres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- ROAST -->
<div id="roast" class="screen">
<h2>Roast</h2>
<input id="roastInput" placeholder="Enter name">
<br>
<button onclick="roast()">GO</button>
<div id="roastres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- AURA -->
<div id="aura" class="screen">
<h2>Aura</h2>
<input id="auraInput" placeholder="Enter name">
<br>
<button onclick="aura()">CHECK</button>
<div id="aurares"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- FLAPPY -->
<div id="flappy" class="screen">
<h2>🐤 Flappy Bird</h2>

<div id="game">
<div id="bird"></div>
</div>

<h3>Score: <span id="score">0</span></h3>

<button onclick="startGame()">START</button>
<button onclick="jump()">JUMP</button>

<div id="msg"></div>

<br><button class="back" onclick="back()">Back</button>
</div>

<script>

/* SCREEN SYSTEM FIX */
function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* BACK FIX */
function back(){
resetFlappy();
show('home');
}

/* OPEN GAME FIX */
function openGame(id){
resetFlappy();
show(id);

if(id==="flappy") initFlappy();
}

/* ---------------- LIE ---------------- */
function lie(){
let t=document.getElementById("lieInput").value;
if(!t) return alert("Enter text!");
document.getElementById("lieres").innerHTML=
`"${t}" → ${Math.floor(Math.random()*100)}% FAKE 💀`;
}

/* ---------------- ROAST ---------------- */
function roast(){
let n=document.getElementById("roastInput").value||"Player";
let arr=[n+" = NPC 💀", n+" brain lagging 😂", n+" buffering"];
document.getElementById("roastres").innerHTML=
arr[Math.floor(Math.random()*arr.length)];
}

/* ---------------- AURA ---------------- */
function aura(){
let n=document.getElementById("auraInput").value||"Player";
let a=Math.floor(Math.random()*1000);

let lvl="";
if(a>800) lvl="GOD 👑";
else if(a>500) lvl="STRONG 😎";
else lvl="LOW 💀";

document.getElementById("aurares").innerHTML=
`${n} → ${a} (${lvl})`;
}

/* ---------------- FLAPPY FIX ---------------- */

let bird=document.getElementById("bird");
let y=120;
let velocity=0;
let gravity=2;

let pipes=[];
let score=0;
let running=false;
let started=false;

function initFlappy(){
y=120;
velocity=0;
pipes=[];
score=0;
running=false;
started=false;

document.getElementById("score").innerText=0;
document.getElementById("msg").innerHTML="";
bird.style.top=y+"px";
}

function startGame(){
if(started) return;
started=true;
running=true;
loop();
}

function jump(){
if(!running) return;
velocity=-8;
}

/* PIPE */
function createPipe(){
let gap=120;
let topH=Math.floor(Math.random()*150)+50;

let top=document.createElement("div");
top.className="pipe";
top.style.height=topH+"px";
top.style.top="0px";
top.style.right="-60px";

let bottom=document.createElement("div");
bottom.className="pipe";
bottom.style.height=(320-topH-gap)+"px";
bottom.style.bottom="0px";
bottom.style.right="-60px";

document.getElementById("game").appendChild(top);
document.getElementById("game").appendChild(bottom);

pipes.push({x:-60,top,bottom,topH,scored:false});
}

/* LOOP */
function loop(){

if(!running) return;

/* FIX: only start physics AFTER start button */
velocity += gravity;
y += velocity;

if(y<0 || y>295){
gameOver();
return;
}

bird.style.top=y+"px";

/* spawn */
if(Math.random()<0.02){
createPipe();
}

/* move */
pipes.forEach(p=>{
p.x+=3;

p.top.style.right=p.x+"px";
p.bottom.style.right=p.x+"px";

/* collision */
if(p.x>40 && p.x<90){
if(y<p.topH || y>p.topH+120){
gameOver();
}
}

/* score */
if(!p.scored && p.x>90){
score++;
p.scored=true;
document.getElementById("score").innerText=score;
}

/* cleanup */
if(p.x>400){
p.top.remove();
p.bottom.remove();
}
});

requestAnimationFrame(loop);
}

function gameOver(){
running=false;
document.getElementById("msg").innerHTML=
"<div class='gameOver'>💀 GAME OVER</div>";
}

function resetFlappy(){
running=false;
started=false;
pipes.forEach(p=>{
if(p.top) p.top.remove();
if(p.bottom) p.bottom.remove();
});
pipes=[];
}

</script>

</body>
</html>
