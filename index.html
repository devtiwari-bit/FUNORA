<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funora - Vedgames Production</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #0a0a1f, #000);
color:white;
text-align:center;
overflow:hidden;
}

/* animated particles */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background-image: radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
opacity:0.05;
animation:move 20s linear infinite;
}

@keyframes move{
from{transform:translateY(0px);}
to{transform:translateY(-200px);}
}

header{
padding:18px;
font-size:26px;
font-weight:bold;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(8px);
border-bottom:1px solid rgba(255,255,255,0.1);
position:relative;
z-index:2;
}

.brand{
font-size:12px;
opacity:0.7;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 5px #00ffcc;}
to{text-shadow:0 0 15px #00ffcc;}
}

.screen{display:none;padding:15px;}
.active{display:block;}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
position:relative;
z-index:2;
}

.card{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:14px;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 20px #00ffcc;
}

button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00ffcc,#00aaff);
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.back{
background:linear-gradient(45deg,#ff4d4d,#ff0066);
color:white;
}

input{
padding:10px;
width:80%;
margin-top:10px;
border:none;
border-radius:8px;
}

.result{
margin-top:10px;
font-size:18px;
}

footer{
position:absolute;
bottom:10px;
width:100%;
font-size:14px;
opacity:0.8;
z-index:2;
}

.slogan{
color:#00ffcc;
margin-top:5px;
font-size:13px;
animation:fade 3s ease-in-out;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<header>
🔥 FUNORA STUDIO
<div class="brand">Made by Vedgames Production</div>
<div class="slogan" id="slogan"></div>
</header>

<!-- HOME -->
<div id="home" class="screen active">

<div class="menu">

<div class="card" onclick="openGame('lie')">🕵️ Lie Detector</div>
<div class="card" onclick="openGame('roast')">🔥 Roast Generator</div>
<div class="card" onclick="openGame('aura')">⚡ Aura Checker</div>
<div class="card" onclick="openGame('flappy')">🐤 Flappy Bird</div>

</div>
</div>

<!-- LIE -->
<div id="lie" class="screen">
<h2>Lie Detector</h2>
<input id="lieInput" placeholder="Enter sentence">
<br>
<button onclick="lie()">SCAN</button>
<div class="result" id="lieres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- ROAST -->
<div id="roast" class="screen">
<h2>Roast Generator</h2>
<input id="roastInput" placeholder="Enter name">
<br>
<button onclick="roast()">ROAST</button>
<div class="result" id="roastres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- AURA -->
<div id="aura" class="screen">
<h2>Aura Checker</h2>
<input id="auraInput" placeholder="Enter name">
<br>
<button onclick="aura()">CHECK</button>
<div class="result" id="aurares"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- FLAPPY -->
<div id="flappy" class="screen">
<h2>🐤 Flappy Bird</h2>

<div id="game">
<div id="bird"></div>
</div>

<h3>Score: <span id="score">0</span></h3>

<button onclick="jump()">JUMP</button>

<br><button class="back" onclick="back()">Back</button>
</div>

<footer>
© Vedgames Production • Ultimate Game Hub
</footer>

<script>

/* NAV */
function openGame(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function back(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('home').classList.add('active');
}

/* LIE */
function lie(){
let t=document.getElementById("lieInput").value;
if(!t) return alert("Enter text!");
document.getElementById("lieres").innerHTML=
`"${t}" → ${Math.floor(Math.random()*100)}% FAKE 💀`;
}

/* ROAST */
function roast(){
let n=document.getElementById("roastInput").value || "Player";

let arr=[
n+" = NPC energy 💀",
n+" runs on low RAM 😂",
n+" is buffering in real life ⏳",
n+" lost update patch 🤡"
];

document.getElementById("roastres").innerHTML=
arr[Math.floor(Math.random()*arr.length)];
}

/* AURA */
function aura(){
let n=document.getElementById("auraInput").value || "Player";

let a=Math.floor(Math.random()*1000);

let lvl="";
if(a>800) lvl="👑 GOD AURA";
else if(a>500) lvl="😎 STRONG";
else lvl="💀 LOW";

document.getElementById("aurares").innerHTML=
`${n} → ${a} (${lvl})`;
}

/* SLOGANS */
let slogans=[
"Play hard. Laugh harder.",
"Made for chaos gamers only.",
"Every click creates legend.",
"Your fun, our code.",
"Glitch the boredom away.",
"One hub. Infinite games.",
"Powered by pure fun energy.",
"Warning: too addictive 💀",
"Born to game, forced to study.",
"Vedgames = Ultimate Chaos Studio"
];

document.getElementById("slogan").innerText =
slogans[Math.floor(Math.random()*slogans.length)];

</script>

</body>
</html>
