<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funora - Vedgames Production</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #0b0b1f, #000);
color:white;
text-align:center;
overflow:hidden;
}

header{
padding:18px;
font-size:26px;
font-weight:bold;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.brand{
font-size:12px;
opacity:0.8;
color:#00ffcc;
}

#slogan{
margin-top:5px;
font-size:13px;
opacity:0.8;
}

.screen{display:none;padding:15px;}
.active{display:block;}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:14px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.1);
}

input{
padding:10px;
width:80%;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00ffcc,#00aaff);
font-weight:bold;
cursor:pointer;
}

.back{
background:linear-gradient(45deg,#ff4d4d,#ff0066);
color:white;
}

/* screens */
.screen{display:none}
.active{display:block}

/* footer */
footer{
position:absolute;
bottom:8px;
width:100%;
font-size:12px;
color:white;
opacity:0.8;
}

</style>
</head>

<body>

<header>
🔥 FUNORA STUDIO
<div class="brand">Vedgames Production</div>
<div id="slogan"></div>
</header>

<!-- HOME -->
<div id="home" class="screen active">

<div class="menu">

<div class="card" onclick="openGame('lie')">🕵️ Lie</div>
<div class="card" onclick="openGame('roast')">🔥 Roast</div>
<div class="card" onclick="openGame('aura')">⚡ Aura</div>
<div class="card" onclick="openGame('click')">👆 Click Battle</div>

</div>
</div>

<!-- LIE -->
<div id="lie" class="screen">
<h2>Lie Detector</h2>
<input id="lieInput" placeholder="Enter sentence">
<br>
<button onclick="lie()">SCAN</button>
<div id="lieres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- ROAST -->
<div id="roast" class="screen">
<h2>Roast Generator</h2>
<input id="roastInput" placeholder="Enter name">
<br>
<button onclick="roast()">ROAST</button>
<div id="roastres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- AURA -->
<div id="aura" class="screen">
<h2>Aura Checker</h2>
<input id="auraInput" placeholder="Enter name">
<br>
<button onclick="aura()">CHECK</button>
<div id="aurares"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- CLICK BATTLE -->
<div id="click" class="screen">
<h2>👆 Click Battle</h2>

<input id="playerName" placeholder="Enter your name">

<h3>Time: <span id="time">10</span>s</h3>
<h3>Clicks: <span id="score">0</span></h3>

<button onclick="startGame()">START</button>
<button onclick="clickMe()">CLICK</button>

<div id="msg"></div>

<h3>🏆 Leaderboard</h3>
<div id="board"></div>

<br><button class="back" onclick="back()">Back</button>
</div>

<!-- FOOTER -->
<footer>
VEEDGAMES PRODUCTION
</footer>

<script>

/* SLOGAN */
let slogans=[
"Play. Create. Dominate.",
"Fun never ends.",
"Click. Win. Repeat.",
"Made for gamers.",
"Level up your fun."
];

document.getElementById("slogan").innerText =
slogans[Math.floor(Math.random()*slogans.length)];

/* NAV */
function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function openGame(id){
resetGame();
show(id);
}

function back(){
resetGame();
show("home");
}

/* ---------------- LIE ---------------- */
function lie(){
let t=document.getElementById("lieInput").value;
if(!t) return alert("Enter text!");
document.getElementById("lieres").innerHTML=
`"${t}" → ${Math.floor(Math.random()*100)}% FAKE 💀`;
}

/* ---------------- ROAST ---------------- */
function roast(){
let n=document.getElementById("roastInput").value;
if(!n) return alert("Enter name!");

let arr=[
n+" = NPC 💀",
n+" brain lagging 😂",
n+" buffering IRL",
n+" skill issue detected"
];

document.getElementById("roastres").innerHTML=
arr[Math.floor(Math.random()*arr.length)];
}

/* ---------------- AURA ---------------- */
function aura(){
let n=document.getElementById("auraInput").value||"Player";
let a=Math.floor(Math.random()*1000);

let lvl=a>800?"👑 GOD":a>500?"😎 STRONG":"💀 LOW";

document.getElementById("aurares").innerHTML=
`${n} → ${a} (${lvl})`;
}

/* ---------------- CLICK GAME ---------------- */

let clicks=0;
let time=10;
let timer=null;
let started=false;
let leaderboard=[];

function startGame(){

let name=document.getElementById("playerName").value;
if(!name){
alert("Enter name!");
return;
}

clicks=0;
time=10;
started=true;

document.getElementById("score").innerText=0;
document.getElementById("time").innerText=10;
document.getElementById("msg").innerHTML="🔥 GO!";

clearInterval(timer);

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;

if(time<=0){
endGame(name);
}
},1000);
}

function clickMe(){
if(!started){
document.getElementById("msg").innerHTML="Press START first!";
return;
}

clicks++;
document.getElementById("score").innerText=clicks;
}

function endGame(name){

started=false;
clearInterval(timer);

leaderboard.push({name:name,score:clicks});
leaderboard.sort((a,b)=>b.score-a.score);

renderBoard();

document.getElementById("msg").innerHTML="💀 TIME UP!";
}

function renderBoard(){

let html="";
leaderboard.slice(0,5).forEach((p,i)=>{
html+=`${i+1}. ${p.name} → ${p.score}<br>`;
});

document.getElementById("board").innerHTML=html;
}

/* RESET */
function resetGame(){

clicks=0;
time=10;
started=false;
clearInterval(timer);

document.getElementById("score").innerText=0;
document.getElementById("time").innerText=10;
document.getElementById("msg").innerHTML="";
}

</script>

</body>
</html>
