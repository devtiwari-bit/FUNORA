<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funora - Veedgames Production</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #0b0b1f, #000);
color:white;
text-align:center;
overflow:hidden;
}

/* floating glow background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background: radial-gradient(circle, rgba(0,255,200,0.08) 1px, transparent 1px);
background-size:50px 50px;
animation:move 25s linear infinite;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-200px);}
}

/* HEADER */
header{
padding:18px;
font-size:26px;
font-weight:bold;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.brand{
font-size:12px;
opacity:0.8;
color:#00ffcc;
}

/* slogan */
#slogan{
margin-top:5px;
font-size:13px;
color:#fff;
opacity:0.8;
}

/* screens */
.screen{display:none;padding:15px;}
.active{display:block;}

/* menu */
.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:14px;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 20px #00ffcc;
}

/* inputs */
input{
padding:10px;
width:80%;
margin-top:10px;
border:none;
border-radius:8px;
outline:none;
}

/* buttons */
button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00ffcc,#00aaff);
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.back{
background:linear-gradient(45deg,#ff4d4d,#ff0066);
color:white;
}

/* FLAPPY */
#game{
width:100%;
height:320px;
background:#000;
position:relative;
overflow:hidden;
border-radius:10px;
}

#bird{
width:25px;
height:25px;
background:yellow;
position:absolute;
left:60px;
top:120px;
border-radius:50%;
}

.pipe{
position:absolute;
width:40px;
background:green;
right:-60px;
}

.gameOver{
color:red;
font-size:22px;
}

/* footer */
footer{
position:absolute;
bottom:8px;
width:100%;
font-size:12px;
color:white;
opacity:0.7;
}

</style>
</head>

<body>

<header>
🔥 FUNORA STUDIO
<div class="brand">Veedgames Production</div>
<div id="slogan"></div>
</header>

<!-- HOME -->
<div id="home" class="screen active">

<div class="menu">

<div class="card" onclick="openGame('lie')">🕵️ Lie</div>
<div class="card" onclick="openGame('roast')">🔥 Roast</div>
<div class="card" onclick="openGame('aura')">⚡ Aura</div>
<div class="card" onclick="openGame('flappy')">🐤 Flappy</div>

</div>
</div>

<!-- LIE -->
<div id="lie" class="screen">
<h2>Lie Detector</h2>
<input id="lieInput" placeholder="Enter sentence">
<br>
<button onclick="lie()">SCAN</button>
<div id="lieres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- ROAST -->
<div id="roast" class="screen">
<h2>Roast Generator</h2>
<input id="roastInput" placeholder="Enter name">
<br>
<button onclick="roast()">ROAST</button>
<div id="roastres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- AURA -->
<div id="aura" class="screen">
<h2>Aura Checker</h2>
<input id="auraInput" placeholder="Enter name">
<br>
<button onclick="aura()">CHECK</button>
<div id="aurares"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- FLAPPY -->
<div id="flappy" class="screen">
<h2>🐤 Flappy Bird</h2>

<div id="game">
<div id="bird"></div>
</div>

<h3>Score: <span id="score">0</span></h3>

<button onclick="startGame()">START</button>
<button onclick="jump()">JUMP</button>

<div id="msg"></div>

<br><button class="back" onclick="back()">Back</button>
</div>

<footer>
© VEEDGAMES PRODUCTION
</footer>

<script>

/* SLOGANS */
let slogans=[
"Play. Create. Dominate.",
"Born for gamers.",
"Fun never ends.",
"Made to break boredom.",
"Level up your fun.",
"Gaming starts here.",
"Click. Play. Win.",
"Your fun universe.",
"Chaos in every click.",
"Veedgames = Legend Studio"
];

document.getElementById("slogan").innerText =
slogans[Math.floor(Math.random()*slogans.length)];

/* NAV */
function openGame(id){
resetFlappy();
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');

if(id==="flappy") initFlappy();
}

function back(){
resetFlappy();
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('home').classList.add('active');
}

/* ---------------- LIE ---------------- */
function lie(){
let t=document.getElementById("lieInput").value;
if(!t) return alert("Enter text!");
document.getElementById("lieres").innerHTML=
`"${t}" → ${Math.floor(Math.random()*100)}% FAKE 💀`;
}

/* ---------------- ROAST ---------------- */
function roast(){
let n=document.getElementById("roastInput").value||"Player";
let arr=[
n+" = NPC energy 💀",
n+" brain lagging 😂",
n+" buffering IRL"
];
document.getElementById("roastres").innerHTML=
arr[Math.floor(Math.random()*arr.length)];
}

/* ---------------- AURA ---------------- */
function aura(){
let n=document.getElementById("auraInput").value||"Player";
let a=Math.floor(Math.random()*1000);

let lvl="";
if(a>800) lvl="👑 GOD";
else if(a>500) lvl="😎 STRONG";
else lvl="💀 LOW";

document.getElementById("aurares").innerHTML=
`${n} → ${a} (${lvl})`;
}

/* ---------------- FLAPPY FIX ---------------- */
let bird=document.getElementById("bird");
let y=120;
let velocity=0;
let gravity=2;

let pipes=[];
let score=0;
let running=false;

function initFlappy(){
y=120;
velocity=0;
pipes=[];
score=0;
running=false;

document.getElementById("score").innerText=0;
document.getElementById("msg").innerHTML="";
bird.style.top=y+"px";
}

/* START FIX (IMPORTANT) */
function startGame(){
running=true;
requestAnimationFrame(loop);
}

function jump(){
if(!running) return;
velocity=-8;
}

/* PIPE */
function createPipe(){
let gap=120;
let topH=Math.floor(Math.random()*150)+50;

let top=document.createElement("div");
top.className="pipe";
top.style.height=topH+"px";
top.style.top="0px";
top.style.right="-60px";

let bottom=document.createElement("div");
bottom.className="pipe";
bottom.style.height=(320-topH-gap)+"px";
bottom.style.bottom="0px";
bottom.style.right="-60px";

document.getElementById("game").appendChild(top);
document.getElementById("game").appendChild(bottom);

pipes.push({
x:-60,
top:top,
bottom:bottom,
topH:topH,
scored:false
});
}

/* GAME LOOP */
function loop(){

if(!running) return;

velocity+=gravity;
y+=velocity;

if(y<0 || y>295){
gameOver();
return;
}

bird.style.top=y+"px";

/* spawn */
if(Math.random()<0.02){
createPipe();
}

/* move */
pipes.forEach(p=>{
p.x+=3;

p.top.style.right=p.x+"px";
p.bottom.style.right=p.x+"px";

/* collision */
if(p.x>40 && p.x<90){
if(y<p.topH || y>p.topH+120){
gameOver();
}
}

/* score */
if(!p.scored && p.x>90){
score++;
p.scored=true;
document.getElementById("score").innerText=score;
}

/* cleanup */
if(p.x>400){
p.top.remove();
p.bottom.remove();
}
});

requestAnimationFrame(loop);
}

function gameOver(){
running=false;
document.getElementById("msg").innerHTML=
"<div class='gameOver'>💀 GAME OVER</div>";
}

function resetFlappy(){
running=false;
pipes.forEach(p=>{
if(p.top) p.top.remove();
if(p.bottom) p.bottom.remove();
});
pipes=[];
}

</script>

</body>
</html>
