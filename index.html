<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funora Studio</title>

<style>

body{
margin:0;
font-family:Arial;
background:#070812;
color:white;
text-align:center;
overflow:hidden;
}

header{
padding:15px;
font-size:24px;
background:#111;
}

.screen{display:none;padding:15px;}
.active{display:block;}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#1a1a2e;
padding:20px;
border-radius:12px;
cursor:pointer;
}

button{
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
background:#00ffcc;
font-weight:bold;
}

.back{background:#ff4d4d;color:white;}

input{
padding:10px;
width:80%;
margin-top:10px;
border-radius:8px;
border:none;
}

.result{margin-top:10px;font-size:18px}

/* FLAPPY */
#game{
width:100%;
height:300px;
background:#000;
position:relative;
overflow:hidden;
border-radius:10px;
}

#bird{
width:25px;
height:25px;
background:yellow;
position:absolute;
left:50px;
top:120px;
border-radius:50%;
}

.pipe{
position:absolute;
width:40px;
background:green;
right:-40px;
}

</style>
</head>

<body>

<header>🔥 FUNORA STUDIO</header>

<!-- HOME -->
<div id="home" class="screen active">

<div class="menu">

<div class="card" onclick="openGame('lie')">Lie</div>
<div class="card" onclick="openGame('roast')">Roast</div>
<div class="card" onclick="openGame('aura')">Aura</div>
<div class="card" onclick="openGame('quiz')">Quiz</div>
<div class="card" onclick="openGame('flappy')">Flappy</div>

</div>
</div>

<!-- LIE -->
<div id="lie" class="screen">
<h2>Lie Detector</h2>
<input id="lieName" placeholder="Enter text">
<br>
<button onclick="lie()">Scan</button>
<div class="result" id="lieres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- ROAST -->
<div id="roast" class="screen">
<h2>Roast Generator</h2>
<input id="roastName" placeholder="Enter name">
<br>
<button onclick="roast()">Roast</button>
<div class="result" id="roastres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- AURA -->
<div id="aura" class="screen">
<h2>Aura Check</h2>
<input id="auraName" placeholder="Enter name">
<br>
<button onclick="aura()">Check</button>
<div class="result" id="aurares"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<h2>Hard Maths Quiz</h2>

<h3 id="q"></h3>
<input id="ans" placeholder="Answer">
<br>
<button onclick="check()">Submit</button>
<div class="result" id="quizres"></div>
<br>
<button onclick="newQ()">New Question</button>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- FLAPPY -->
<div id="flappy" class="screen">
<h2>Flappy Bird</h2>

<div id="game">
<div id="bird"></div>
</div>

<h3>Score: <span id="score">0</span></h3>

<button onclick="jump()">Jump</button>

<br><button class="back" onclick="back()">Back</button>
</div>

<script>

/* NAV */
function openGame(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
function back(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('home').classList.add('active');
}

/* LIE */
function lie(){
let t=document.getElementById("lieName").value;
document.getElementById("lieres")=
document.getElementById("lieres").innerHTML =
Math.floor(Math.random()*100)+"% FAKE 💀";
}

/* ROAST */
function roast(){
let n=document.getElementById("roastName").value||"Player";
let arr=[
n+" = NPC energy 💀",
n+" studies from reels 😂",
n+" brain lagging..."
];
document.getElementById("roastres").innerHTML=
arr[Math.floor(Math.random()*arr.length)];
}

/* AURA */
function aura(){
let n=document.getElementById("auraName").value||"Player";
let a=Math.floor(Math.random()*1000);
document.getElementById("aurares").innerHTML=
n+" Aura: "+a;
}

/* QUIZ */
let a,b,op,correct;

function newQ(){
a=Math.floor(Math.random()*20);
b=Math.floor(Math.random()*20);
op=["+","-","*"][Math.floor(Math.random()*3)];

if(op=="+") correct=a+b;
if(op=="-") correct=a-b;
if(op=="*") correct=a*b;

document.getElementById("q").innerHTML=`${a} ${op} ${b} = ?`;
document.getElementById("quizres").innerHTML="";
}
newQ();

function check(){
let ans=document.getElementById("ans").value;
document.getElementById("quizres").innerHTML=
(ans==correct)?"✔ Correct":"❌ Wrong";
newQ();
document.getElementById("ans").value="";
}

/* FLAPPY */
let bird=document.getElementById("bird");
let y=120;
let gravity=2;
let velocity=0;
let score=0;

let pipes=[];

function jump(){
velocity=-8;
}

function gameLoop(){

velocity+=gravity;
y+=velocity;

if(y<0) y=0;
if(y>275) y=275;

bird.style.top=y+"px";

/* simple pipe logic */
if(Math.random()<0.02){
let pipe=document.createElement("div");
pipe.className="pipe";
pipe.style.height=(Math.random()*150+50)+"px";
pipe.style.top="0px";
pipe.style.right="-40px";
document.getElementById("game").appendChild(pipe);
pipes.push(pipe);
score++;
document.getElementById("score").innerHTML=score;
}

pipes.forEach(p=>{
let r=parseInt(p.style.right);
p.style.right=(r+2)+"px";

if(r>350){
p.remove();
}
});

requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
