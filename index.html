<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funora - Vedgames Production</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #0b0b1f, #000);
color:white;
text-align:center;
overflow:hidden;
}

header{
padding:18px;
font-size:26px;
font-weight:bold;
background:rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.brand{
font-size:12px;
opacity:0.8;
color:#00ffcc;
}

.screen{display:none;padding:15px;}
.active{display:block;}

.menu{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:14px;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 20px #00ffcc;
}

input{
padding:10px;
width:80%;
margin-top:10px;
border:none;
border-radius:8px;
}

button{
padding:10px 15px;
margin-top:10px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00ffcc,#00aaff);
font-weight:bold;
cursor:pointer;
}

.back{
background:linear-gradient(45deg,#ff4d4d,#ff0066);
color:white;
}

.result{
margin-top:10px;
font-size:18px;
}

footer{
position:absolute;
bottom:8px;
width:100%;
font-size:12px;
color:white;
opacity:0.7;
}

</style>
</head>

<body>

<header>
🔥 FUNORA STUDIO
<div class="brand">Vedgames Production</div>
</header>

<!-- HOME -->
<div id="home" class="screen active">

<div class="menu">

<div class="card" onclick="openGame('lie')">🕵️ Lie</div>
<div class="card" onclick="openGame('roast')">🔥 Roast</div>
<div class="card" onclick="openGame('aura')">⚡ Aura</div>
<div class="card" onclick="openGame('click')">👆 Click Battle</div>

</div>
</div>

<!-- LIE -->
<div id="lie" class="screen">
<h2>Lie Detector</h2>
<input id="lieInput" placeholder="Enter sentence">
<br>
<button onclick="lie()">SCAN</button>
<div id="lieres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- ROAST -->
<div id="roast" class="screen">
<h2>Roast Generator</h2>
<input id="roastInput" placeholder="Enter name">
<br>
<button onclick="roast()">ROAST</button>
<div id="roastres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- AURA -->
<div id="aura" class="screen">
<h2>Aura Checker</h2>
<input id="auraInput" placeholder="Enter name">
<br>
<button onclick="aura()">CHECK</button>
<div id="aurares"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- CLICK GAME -->
<div id="click" class="screen">
<h2>👆 Click Battle</h2>

<input id="playerName" placeholder="Enter your name">

<h3>Clicks: <span id="score">0</span></h3>

<button onclick="startClick()">START</button>
<button onclick="clickMe()">CLICK</button>

<div id="msg"></div>

<br><button class="back" onclick="back()">Back</button>
</div>

<script>

/* NAV */
function openGame(id){
resetGame();
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function back(){
resetGame();
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('home').classList.add('active');
}

/* ---------------- LIE ---------------- */
function lie(){
let t=document.getElementById("lieInput").value;
if(!t) return alert("Enter text!");
document.getElementById("lieres").innerHTML=
`"${t}" → ${Math.floor(Math.random()*100)}% FAKE 💀`;
}

/* ---------------- ROAST (FIXED) ---------------- */
function roast(){
let n=document.getElementById("roastInput").value;
if(!n){
if(navigator.vibrate) navigator.vibrate(200);
document.getElementById("roastres").innerHTML="⚠️ Enter name!";
return;
}

let arr=[
n+" = NPC energy 💀",
n+" brain lagging 😂",
n+" buffering IRL",
n+" still loading..."
];

document.getElementById("roastres").innerHTML=
arr[Math.floor(Math.random()*arr.length)];
}

/* ---------------- AURA ---------------- */
function aura(){
let n=document.getElementById("auraInput").value||"Player";
let a=Math.floor(Math.random()*1000);

let lvl=a>800?"👑 GOD":a>500?"😎 STRONG":"💀 LOW";

document.getElementById("aurares").innerHTML=
`${n} → ${a} (${lvl})`;
}

/* ---------------- CLICK BATTLE ---------------- */

let clicks=0;
let started=false;

function startClick(){
let name=document.getElementById("playerName").value;
if(!name){
if(navigator.vibrate) navigator.vibrate(200);
alert("Enter name!");
return;
}

started=true;
clicks=0;
document.getElementById("score").innerText=0;
document.getElementById("msg").innerHTML="GO! 👆";
}

function clickMe(){
if(!started){
document.getElementById("msg").innerHTML="Press START first!";
return;
}

clicks++;
document.getElementById("score").innerText=clicks;

if(clicks>=50){
document.getElementById("msg").innerHTML="🔥 MAX POWER CLICKER!";
}
}

/* RESET */
function resetGame(){
clicks=0;
started=false;
document.getElementById("score").innerText=0;
document.getElementById("msg").innerHTML="";
}

</script>

</body>
</html>
