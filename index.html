<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funora - Vedgames Production</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #0f1020, #000);
color:white;
text-align:center;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
background: rgba(255,255,255,0.05);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.brand{
font-size:12px;
opacity:0.7;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background: rgba(255,255,255,0.06);
padding:25px;
border-radius:16px;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(255,255,255,0.1);
}

.card:hover{
transform:scale(1.05);
border-color:#00ffcc;
box-shadow:0 0 15px #00ffcc;
}

.screen{
display:none;
padding:20px;
}

.active{
display:block;
}

button{
padding:12px 18px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00ffcc,#00aaff);
font-weight:bold;
cursor:pointer;
}

.back{
background:linear-gradient(45deg,#ff4d4d,#ff0066);
color:white;
}

input{
padding:12px;
width:80%;
max-width:300px;
margin-top:10px;
border-radius:10px;
border:none;
}

.result{
margin-top:15px;
font-size:20px;
}

.glow{
color:#00ffcc;
text-shadow:0 0 10px #00ffcc;
}

</style>
</head>

<body>

<header>
🔥 FUNORA
<div class="brand">Made by Vedgames Production</div>
</header>

<!-- HOME -->
<div id="home" class="screen active">

<h2 class="glow">Select Game</h2>

<div class="menu">

<div class="card" onclick="openGame('lie')">🕵️ Lie Detector</div>
<div class="card" onclick="openGame('roast')">🔥 Roast</div>
<div class="card" onclick="openGame('aura')">⚡ Aura</div>
<div class="card" onclick="openGame('battle')">⚔️ Battle</div>
<div class="card" onclick="openGame('click')">🏆 Click Battle</div>

</div>

</div>

<!-- LIE -->
<div id="lie" class="screen">
<h2>🕵️ Lie Detector</h2>
<button onclick="lie()">SCAN</button>
<div class="result" id="lieres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- ROAST -->
<div id="roast" class="screen">
<h2>🔥 Roast</h2>
<input id="name" placeholder="Name">
<br>
<button onclick="roast()">ROAST</button>
<div class="result" id="roastres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- AURA -->
<div id="aura" class="screen">
<h2>⚡ Aura</h2>
<button onclick="aura()">CHECK</button>
<div class="result" id="aurares"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- BATTLE -->
<div id="battle" class="screen">
<h2>⚔️ Battle</h2>
<input id="p1" placeholder="P1"><br>
<input id="p2" placeholder="P2"><br>
<button onclick="battle()">FIGHT</button>
<div class="result" id="battleres"></div>
<br><button class="back" onclick="back()">Back</button>
</div>

<!-- CLICK BATTLE -->
<div id="click" class="screen">
<h2>🏆 Click Battle (10 sec)</h2>

<input id="player" placeholder="Your Name"><br>

<h3>Score: <span id="score">0</span></h3>

<button onclick="startGame()">Start</button>
<button onclick="clickMe()">CLICK ME</button>

<div class="result" id="time"></div>

<h3>🏅 Leaderboard</h3>
<div id="board"></div>

<br><button class="back" onclick="back()">Back</button>
</div>

<script>

let score=0;
let time=10;
let running=false;
let timer;

// NAV
function openGame(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function back(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('home').classList.add('active');
}

// OLD GAMES
function lie(){
document.getElementById("lieres").innerHTML =
Math.floor(Math.random()*100)+"% FAKE 💀";
}

function roast(){
let n=document.getElementById("name").value;
let arr=[
n+" is buffering in life ⏳",
n+" has 2GB brain RAM 😂",
n+" studies from reels 💀"
];
document.getElementById("roastres").innerHTML =
arr[Math.floor(Math.random()*arr.length)];
}

function aura(){
let a=Math.floor(Math.random()*1000);
document.getElementById("aurares").innerHTML="Aura: "+a;
}

function battle(){
let p1=document.getElementById("p1").value;
let p2=document.getElementById("p2").value;
let win=Math.random()<0.5?p1:p2;
document.getElementById("battleres").innerHTML=win+" WINS 🏆";
}

// CLICK BATTLE
function startGame(){
score=0;
time=10;
running=true;
document.getElementById("score").innerHTML=score;

timer=setInterval(()=>{
time--;
document.getElementById("time").innerHTML="Time: "+time;

if(time<=0){
clearInterval(timer);
running=false;
saveScore();
loadBoard();
}
},1000);
}

function clickMe(){
if(running){
score++;
document.getElementById("score").innerHTML=score;
}
}

function saveScore(){
let name=document.getElementById("player").value || "Player";
let data=JSON.parse(localStorage.getItem("board")||"[]");

data.push({name:name,score:score});
data.sort((a,b)=>b.score-a.score);
data=data.slice(0,5);

localStorage.setItem("board",JSON.stringify(data));
}

function loadBoard(){
let data=JSON.parse(localStorage.getItem("board")||"[]");
let html="";

data.forEach(d=>{
html+=`<p>🏅 ${d.name} - ${d.score}</p>`;
});

document.getElementById("board").innerHTML=html;
}

loadBoard();

</script>

</body>
</html>
