<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funora - Vedgames Production</title>

<style>

body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #1a1a2e, #000);
color:white;
text-align:center;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.brand{
font-size:12px;
opacity:0.7;
margin-top:5px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background: rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:18px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(0,255,200,0.1);
}

.card:hover{
transform:translateY(-5px) scale(1.03);
box-shadow:0 0 20px rgba(0,255,200,0.4);
border-color:#00ffcc;
}

.screen{
display:none;
padding:20px;
animation:fade 0.4s ease;
}

.active{
display:block;
}

@keyframes fade{
from{opacity:0; transform:scale(0.95);}
to{opacity:1; transform:scale(1);}
}

input{
padding:12px;
width:85%;
max-width:300px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
padding:12px 18px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00ffcc,#00aaff);
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.back{
background:linear-gradient(45deg,#ff4d4d,#ff0066);
color:white;
margin-top:20px;
}

.result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.glow{
color:#00ffcc;
text-shadow:0 0 10px #00ffcc;
}

</style>
</head>

<body>

<header>
🔥 FUNORA
<div class="brand">Made by Vedgames Production</div>
</header>

<!-- HOME -->
<div id="home" class="screen active">

<h2 class="glow">Choose Your Game</h2>

<div class="menu">

<div class="card" onclick="openGame('lie')">🕵️ Lie Detector</div>
<div class="card" onclick="openGame('roast')">🔥 Roast Generator</div>
<div class="card" onclick="openGame('aura')">⚡ Aura Check</div>
<div class="card" onclick="openGame('battle')">⚔️ Battle</div>

</div>

</div>

<!-- LIE -->
<div id="lie" class="screen">
<h2>🕵️ Lie Detector</h2>
<input id="lieInput" placeholder="Type anything">
<br>
<button onclick="lie()">SCAN</button>
<div class="result" id="lieres"></div>
<br>
<button class="back" onclick="back()">⬅ Back</button>
</div>

<!-- ROAST -->
<div id="roast" class="screen">
<h2>🔥 Roast Generator</h2>
<input id="name" placeholder="Enter name">
<br>
<button onclick="roast()">ROAST</button>
<div class="result" id="roastres"></div>
<br>
<button class="back" onclick="back()">⬅ Back</button>
</div>

<!-- AURA -->
<div id="aura" class="screen">
<h2>⚡ Aura Checker</h2>
<button onclick="aura()">Check Aura</button>
<div class="result" id="aurares"></div>
<br>
<button class="back" onclick="back()">⬅ Back</button>
</div>

<!-- BATTLE -->
<div id="battle" class="screen">
<h2>⚔️ Friend Battle</h2>
<input id="p1" placeholder="Player 1"><br>
<input id="p2" placeholder="Player 2"><br>
<button onclick="battle()">FIGHT</button>
<div class="result" id="battleres"></div>
<br>
<button class="back" onclick="back()">⬅ Back</button>
</div>

<script>

function openGame(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function back(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById('home').classList.add('active');
}

function lie(){
let p = Math.floor(Math.random()*100);
document.getElementById("lieres").innerHTML =
"🚨 " + p + "% FAKE DETECTED";
}

function roast(){
let n = document.getElementById("name").value;

let roasts=[
n+" has NPC energy 💀",
n+" studies from reels 😂",
n+" is buffering in real life ⏳",
n+" lost IQ in update 🤡"
];

document.getElementById("roastres").innerHTML =
roasts[Math.floor(Math.random()*roasts.length)];
}

function aura(){
let a = Math.floor(Math.random()*1000);

let txt="";
if(a>800) txt="👑 LEGENDARY AURA";
else if(a>500) txt="😎 STRONG AURA";
else txt="💀 NPC ENERGY";

document.getElementById("aurares").innerHTML =
a + " Aura → " + txt;
}

function battle(){
let p1=document.getElementById("p1").value;
let p2=document.getElementById("p2").value;

let win = Math.random()<0.5?p1:p2;

document.getElementById("battleres").innerHTML =
"🏆 " + win + " WINS!";
}

</script>

</body>
</html>
